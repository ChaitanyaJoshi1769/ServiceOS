apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceos-api
  namespace: serviceos
  labels:
    app: serviceos-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: serviceos-api
  template:
    metadata:
      labels:
        app: serviceos-api
        version: v1
    spec:
      containers:
      - name: api
        image: serviceos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: serviceos-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: serviceos-secrets
              key: redis-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: serviceos-secrets
              key: anthropic-api-key
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: serviceos-api
  namespace: serviceos
spec:
  selector:
    app: serviceos-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: serviceos-api-hpa
  namespace: serviceos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: serviceos-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
